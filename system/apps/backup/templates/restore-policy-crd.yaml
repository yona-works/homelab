apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: restorepolicies.backup.homelab
spec:
  group: backup.homelab
  scope: Namespaced
  names:
    plural: restorepolicies
    singular: restorepolicy
    kind: RestorePolicy
    shortNames:
      - rpol
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - sourceNamespace
                - volumes
              properties:
                sourceNamespace:
                  type: string
                volumes:
                  type: array
                  items:
                    type: object
                    required: [sourcePVC, targetPVC]
                    properties:
                      sourcePVC:
                        type: string
                      targetPVC:
                        type: string
                      restoreAsOf:
                        type: string
                        format: date-time
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
