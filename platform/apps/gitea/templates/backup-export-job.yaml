{{- if .Values.backupExportJob.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-backup
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-backup
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-backup
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: gitea-backup
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: gitea-backup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-export
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  suspend: true
  template:
    spec:
      serviceAccountName: gitea-backup
      restartPolicy: Never
      containers:
        - name: export
          image: "{{ .Values.backupExportJob.image.repository }}:{{ .Values.backupExportJob.image.tag }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: NAMESPACE
              value: "{{ .Release.Namespace }}"
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail

              echo "Running gitea dump..."
              kubectl -n "${NAMESPACE}" rollout status deployment/gitea --timeout=10m
              gitea_dump_ts="$(date -u +%Y%m%d%H%M%S)"
              kubectl -n "${NAMESPACE}" exec deploy/gitea -- /bin/sh -c "\
                mkdir -p /dump && \
                rm -f /dump/gitea-dump-*.zip && \
                gitea dump --file /dump/gitea-dump-${gitea_dump_ts}.zip \
              "
{{- end }}
